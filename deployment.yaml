# microservice-c/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-c
  namespace: edge
  labels:
    app: microservice-c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-c
  template:
    metadata:
      labels:
        app: microservice-c
    spec:
      containers:
        - name: microservice-c
          image: microservice-c:latest
          imagePullPolicy: Never   # image construite localement sur le Pi
          env:
            - name: MSVC_B_URL
              value: "http://microservice-b-service.edge:8001"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          # Pas de port exposé : le service ne reçoit pas de trafic entrant
      restartPolicy: Always
---
# Pas besoin de Service pour Microservice C (il ne reçoit pas de connexions)
# Il se connecte vers l'extérieur uniquement
